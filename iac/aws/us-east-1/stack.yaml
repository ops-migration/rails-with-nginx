AWSTemplateFormatVersion: '2010-09-09'
Description: 'Nested ECR / ECS stack for function-manager'

# ─── Parameters ────────────────────────────────────────────────────────
Parameters:
  RailsImage:
    Type: String                          # always required 

  NginxImage:
    Type: String
    Default: ''                           # optional — only used in double mode

  CommitHash:
    Type: String
    Default: ''
    
  Environment:
    Type: String
    Default: dev

  ALBListenerArn:
    Type: String
    Default: arn:aws:elasticloadbalancing:us-east-1:106237071060:listener/app/dev-alb/5442eb65e0514d69/2f33d7ad63a3d139
    
  ECSClusterName:
    Type: String
    Default: dev-ecs-cluster
  
  AppName:
    Type: String
    Default: function-manager

  # Single source-of-truth for all nested template URLs (HTTPS is fine here)
  TemplateBucketUrl:
    Type: String
    Default: https://ecs-migration-cloud-formation-templates.s3.us-east-1.amazonaws.com/templates

  # Single source-of-truth for all nested policy file URLs (must be s3:// for AWS::Include)
  PolicyBucketUrl:
    Type: String
    Default: s3://ecs-migration-cloud-formation-templates/templates/policies
    
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-04c6d87c521fddb25

# ─── Conditions ───────────────────────────────────────────────────────────────
Conditions:
  IsDoubleContainer: !Not [!Equals [!Ref NginxImage, '']]
  IsSingleContainer: !Not [!Condition IsDoubleContainer]

# ─── Resources ────────────────────────────────────────────────────────────────
Resources:

  # ─────── IAM Role ─────────────────────────────────────────────────
  FunctionManagerIAMStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/iam-task.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        TaskRolePolicyJson: !Sub '${PolicyBucketUrl}/iam-task-policy.json'

  # ─────── Target Group ─────────────────────────────────────────────
  FunctionManagerTargetGroupStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/target-group.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        VpcId: !Ref VpcId
        ALBListenerArn: !Ref ALBListenerArn
        HostHeader: !Sub '${AppName}.example.com'
        TargetPort: 80   # 80 for nginx (double), 3000 for rails (single) – adjust inside nested if needed
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-${AppName}-tg'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # ─────── Task Definition Double stack ─────────────────────────────
  FunctionManagerTaskDefDoubleStack:
    Type: AWS::CloudFormation::Stack
    Condition: IsDoubleContainer
    DependsOn: FunctionManagerIAMStack
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/rails-nginx-tf.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        RailsImage: !Ref RailsImage
        NginxImage: !Ref NginxImage
        RailsContainerPort: 3000
        NginxContainerPort: 80
        TaskCPU: 512
        TaskMemory: 1024
        TaskRoleArn: !GetAtt FunctionManagerIAMStack.Outputs.TaskRoleArn
        ExecutionRoleArn: "arn:aws:iam::106237071060:role/dev-myapp-execution-role"

  # ─────── Task Definition Single stack ─────────────────────────────
  FunctionManagerTaskDefSingleStack:
    Type: AWS::CloudFormation::Stack
    Condition: IsSingleContainer
    DependsOn: FunctionManagerIAMStack
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/rails-tf.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        RailsImage: !Ref RailsImage
        RailsContainerPort: 3000
        TaskCPU: 512
        TaskMemory: 1024
        TaskRoleArn: !GetAtt FunctionManagerIAMStack.Outputs.TaskRoleArn
        ExecutionRoleArn: "arn:aws:iam::106237071060:role/dev-myapp-execution-role"
  # ─────── ECS Service ──────────────────────────────────────────────
  FunctionManagerECSServiceStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - FunctionManagerTargetGroupStack
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/ecs-service.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        ECSClusterName: !Ref ECSClusterName
        TaskDefinitionArn: !If
          - IsDoubleContainer
          - !GetAtt FunctionManagerTaskDefDoubleStack.Outputs.TaskDefinitionArn
          - !GetAtt FunctionManagerTaskDefSingleStack.Outputs.TaskDefinitionArn
        TargetGroupArn: !GetAtt FunctionManagerTargetGroupStack.Outputs.TargetGroupArn
        ContainerName: !If [IsDoubleContainer, 'nginx', 'rails']
        ContainerPort: !If [IsDoubleContainer, '80', '3000']
        DesiredCount: 1
        ScalingMinCapacity: 1
        ScalingMaxCapacity: 4
        CPUScaleOutThreshold: 70
        CPUScaleInThreshold: 30
        MemoryScaleOutThreshold: 75
        MemoryScaleInThreshold: 40
        VpcSubnetIds: 'subnet-0eabd0999a1e9300b,subnet-03f8f438576701c78'     
        SecurityGroupIds: 'sg-0c3dd955dc38a6823'  
 
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-${AppName}-service'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation
          
 # ─────────────────────────────────────────────────────────────────────
